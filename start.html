<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chwazi Clone - Touch Player Selection</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            position: relative;
            touch-action: none; /* Prevent default touch behaviors */
            user-select: none; /* Prevent text selection */
        }

        /* Game Container */
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 50%);
        }

        /* Status Display */
        .status-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .status-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f39c12);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease-in-out infinite;
        }

        .status-message {
            font-size: 16px;
            opacity: 0.9;
            color: #e0e0e0;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Touch Circles */
        .touch-circle {
            position: absolute;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%) scale(0);
            animation: circle-appear 0.3s ease-out forwards;
        }

        /* Outer rotating ring */
        .circle-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--circle-color), transparent, var(--circle-color));
            animation: rotate 2s linear infinite;
            opacity: 0.8;
        }

        /* Inner solid fill */
        .circle-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background: var(--circle-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            opacity: 0.9;
        }

        /* Circle animations */
        @keyframes circle-appear {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes eliminate {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        @keyframes winner-celebrate {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: brightness(1) drop-shadow(0 0 10px var(--circle-color));
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.4); 
                filter: brightness(1.5) drop-shadow(0 0 30px var(--circle-color));
            }
        }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 18px;
            opacity: 0.7;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }

        .instructions.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Reset button */
        .reset-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .reset-button:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        /* Game states */
        .game-container.eliminating .instructions {
            opacity: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .touch-circle {
                width: 100px;
                height: 100px;
            }
            
            .circle-inner {
                width: 65px;
                height: 65px;
            }
            
            .status-title {
                font-size: 20px;
            }
            
            .status-message {
                font-size: 14px;
            }
            
            .instructions {
                font-size: 16px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Status Display -->
        <div class="status-display">
            <div class="status-title">Chwazi Clone</div>
            <div class="status-message" id="statusMessage">Touch the screen with multiple fingers</div>
        </div>

        <!-- Instructions -->
        <div class="instructions" id="instructions">
            Place 2-12 fingers on the screen and wait for the selection!
        </div>

        <!-- Reset Button -->
        <button class="reset-button" id="resetButton" onclick="resetGame()">Reset</button>
    </div>

    <script>
        // Game state management
        let gameState = 'idle'; // 'idle', 'active', 'eliminating', 'winner'
        let touchPoints = new Map(); // Map to store active touch points
        let eliminationTimer = null;
        let eliminationInProgress = false;

        // Color palette for circles (12 distinct colors)
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#f39c12',
            '#e74c3c', '#2ecc71', '#9b59b6', '#f1c40f',
            '#e67e22', '#1abc9c', '#3498db', '#fd79a8'
        ];

        // DOM elements
        const gameContainer = document.getElementById('gameContainer');
        const statusMessage = document.getElementById('statusMessage');
        const instructions = document.getElementById('instructions');

        // Haptic feedback helper function
        function vibrate(duration) {
            if ('vibrate' in navigator) {
                navigator.vibrate(duration);
            }
        }

        // Create a new touch circle element
        function createTouchCircle(touch, colorIndex) {
            const circle = document.createElement('div');
            circle.className = 'touch-circle';
            circle.id = `circle-${touch.identifier}`;
            
            // Set CSS custom property for color
            const color = colors[colorIndex % colors.length];
            circle.style.setProperty('--circle-color', color);
            
            // Position the circle
            circle.style.left = `${touch.clientX}px`;
            circle.style.top = `${touch.clientY}px`;
            
            // Create inner structure
            circle.innerHTML = `
                <div class="circle-outer"></div>
                <div class="circle-inner"></div>
            `;
            
            gameContainer.appendChild(circle);
            
            // Haptic feedback for new touch
            vibrate(30);
            
            return circle;
        }

        // Update circle position during touch move
        function updateCirclePosition(touch) {
            const circle = document.getElementById(`circle-${touch.identifier}`);
            if (circle) {
                circle.style.left = `${touch.clientX}px`;
                circle.style.top = `${touch.clientY}px`;
            }
        }

        // Remove touch circle
        function removeTouchCircle(touchId) {
            const circle = document.getElementById(`circle-${touchId}`);
            if (circle) {
                circle.remove();
            }
        }

        // Update status message based on game state
        function updateStatus() {
            const touchCount = touchPoints.size;
            
            switch (gameState) {
                case 'idle':
                    if (touchCount === 0) {
                        statusMessage.textContent = 'Touch the screen with multiple fingers';
                    } else if (touchCount === 1) {
                        statusMessage.textContent = 'Add more fingers (need at least 2)';
                    } else {
                        statusMessage.textContent = `${touchCount} players ready - lift fingers to start!`;
                    }
                    break;
                case 'active':
                    statusMessage.textContent = `${touchCount} players - keep fingers down!`;
                    break;
                case 'eliminating':
                    statusMessage.textContent = 'Eliminating players...';
                    break;
                case 'winner':
                    statusMessage.textContent = 'Winner selected! 🎉';
                    break;
            }
        }

        // Start elimination process
        function startElimination() {
            if (eliminationInProgress || touchPoints.size < 2) return;
            
            eliminationInProgress = true;
            gameState = 'eliminating';
            gameContainer.classList.add('eliminating');
            updateStatus();
            
            // Convert touchPoints to array for elimination
            const players = Array.from(touchPoints.keys());
            let remainingPlayers = [...players];
            
            // Elimination sequence
            function eliminateNext() {
                if (remainingPlayers.length <= 1) {
                    // We have a winner!
                    if (remainingPlayers.length === 1) {
                        selectWinner(remainingPlayers[0]);
                    } else {
                        // Edge case: all eliminated somehow
                        resetGame();
                    }
                    return;
                }
                
                // Randomly select a player to eliminate
                const eliminateIndex = Math.floor(Math.random() * remainingPlayers.length);
                const eliminatedPlayer = remainingPlayers[eliminateIndex];
                remainingPlayers.splice(eliminateIndex, 1);
                
                // Animate elimination
                const circle = document.getElementById(`circle-${eliminatedPlayer}`);
                if (circle) {
                    circle.style.animation = 'eliminate 0.8s ease-in-out forwards';
                    setTimeout(() => {
                        circle.remove();
                    }, 800);
                }
                
                // Haptic feedback for elimination
                vibrate(50);
                
                // Continue elimination after delay
                setTimeout(eliminateNext, 1200);
            }
            
            // Start elimination sequence after initial delay
            setTimeout(eliminateNext, 1000);
        }

        // Select winner and celebrate
        function selectWinner(winnerId) {
            gameState = 'winner';
            gameContainer.classList.remove('eliminating');
            updateStatus();
            
            const winnerCircle = document.getElementById(`circle-${winnerId}`);
            if (winnerCircle) {
                winnerCircle.style.animation = 'winner-celebrate 1s ease-in-out infinite';
                winnerCircle.style.zIndex = '200';
            }
            
            // Winner celebration vibration pattern
            vibrate([100, 50, 100, 50, 200]);
            
            // Auto reset after celebration
            setTimeout(() => {
                resetGame();
            }, 4000);
        }

        // Reset game to initial state
        function resetGame() {
            gameState = 'idle';
            eliminationInProgress = false;
            gameContainer.classList.remove('eliminating');
            
            // Clear all touch circles
            touchPoints.clear();
            const circles = document.querySelectorAll('.touch-circle');
            circles.forEach(circle => circle.remove());
            
            // Clear any existing timers
            if (eliminationTimer) {
                clearTimeout(eliminationTimer);
                eliminationTimer = null;
            }
            
            // Reset instructions visibility
            instructions.classList.remove('hidden');
            
            updateStatus();
        }

        // Touch event handlers
        function handleTouchStart(event) {
            event.preventDefault();
            
            if (gameState === 'eliminating' || gameState === 'winner') return;
            
            const touches = event.changedTouches;
            let colorIndex = touchPoints.size;
            
            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                
                // Store touch point data
                touchPoints.set(touch.identifier, {
                    x: touch.clientX,
                    y: touch.clientY,
                    colorIndex: colorIndex
                });
                
                // Create visual circle
                createTouchCircle(touch, colorIndex);
                colorIndex++;
            }
            
            gameState = 'active';
            instructions.classList.add('hidden');
            updateStatus();
            
            // Clear any existing elimination timer
            if (eliminationTimer) {
                clearTimeout(eliminationTimer);
            }
        }

        function handleTouchMove(event) {
            event.preventDefault();
            
            if (gameState === 'eliminating' || gameState === 'winner') return;
            
            const touches = event.changedTouches;
            
            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                
                if (touchPoints.has(touch.identifier)) {
                    // Update touch point data
                    const touchData = touchPoints.get(touch.identifier);
                    touchData.x = touch.clientX;
                    touchData.y = touch.clientY;
                    
                    // Update circle position
                    updateCirclePosition(touch);
                }
            }
        }

        function handleTouchEnd(event) {
            event.preventDefault();
            
            if (gameState === 'eliminating' || gameState === 'winner') return;
            
            const touches = event.changedTouches;
            
            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                
                if (touchPoints.has(touch.identifier)) {
                    touchPoints.delete(touch.identifier);
                    removeTouchCircle(touch.identifier);
                }
            }
            
            // Check if we should start elimination
            if (touchPoints.size === 0 && gameState === 'active') {
                // All fingers lifted - but we need to check if we had enough players
                const remainingCircles = document.querySelectorAll('.touch-circle');
                if (remainingCircles.length >= 2) {
                    // Start elimination with remaining circles
                    eliminationTimer = setTimeout(() => {
                        startElimination();
                    }, 500);
                } else {
                    // Not enough players, reset to idle
                    resetGame();
                }
            } else if (touchPoints.size > 0) {
                updateStatus();
            }
        }

        // Add touch event listeners
        gameContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        gameContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        gameContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
        gameContainer.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        // Prevent context menu on long press
        gameContainer.addEventListener('contextmenu', (e) => e.preventDefault());

        // Initialize status
        updateStatus();

        // Add mouse support for desktop testing
        let mouseDown = false;
        let mouseId = 'mouse';

        gameContainer.addEventListener('mousedown', (e) => {
            if (mouseDown) return;
            mouseDown = true;
            
            const fakeTouch = {
                identifier: mouseId,
                clientX: e.clientX,
                clientY: e.clientY
            };
            
            handleTouchStart({ 
                preventDefault: () => {}, 
                changedTouches: [fakeTouch] 
            });
        });

        gameContainer.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            
            const fakeTouch = {
                identifier: mouseId,
                clientX: e.clientX,
                clientY: e.clientY
            };
            
            handleTouchMove({ 
                preventDefault: () => {}, 
                changedTouches: [fakeTouch] 
            });
        });

        gameContainer.addEventListener('mouseup', (e) => {
            if (!mouseDown) return;
            mouseDown = false;
            
            const fakeTouch = {
                identifier: mouseId,
                clientX: e.clientX,
                clientY: e.clientY
            };
            
            handleTouchEnd({ 
                preventDefault: () => {}, 
                changedTouches: [fakeTouch] 
            });
        });

        // Prevent scrolling and zooming on mobile
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());
        document.addEventListener('gestureend', (e) => e.preventDefault());
    </script>
</body>
</html>
