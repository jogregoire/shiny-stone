<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cercles Deplacables</title>
    <style>
        :root {
            --bg-top: #f6efe5;
            --bg-bottom: #d7e7f5;
            --panel: rgba(22, 144, 214, 0.82);
            --text: #1f2933;
            --muted: #52606d;
            --ring: rgba(31, 41, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 196, 140, 0.35), transparent 24%),
                linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
            overflow: hidden;
        }

        .panel {
            position: fixed;
            top: 
            2rem;
            left: 2rem;
            z-index: 10;
            max-width: min(26rem, calc(100vw - 2rem));
            padding: 1rem 1.25rem;
            border: 1px solid var(--ring);
            border-radius: 1.2rem;
            background: var(--panel);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(31, 41, 51, 0.12);
        }

        h1 {
            margin: 0 0 0.35rem;
            font-size: clamp(1.7rem, 3vw, 2.5rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
            font-size: 1rem;
        }

        .playground {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: grab;
            touch-action: none;
        }

        .playground.dragging {
            cursor: grabbing;
        }

        .circle {
            --size: 110px;
            position: absolute;
            width: var(--size);
            height: var(--size);
            border: 0;
            border-radius: 50%;
            cursor: grab;
            box-shadow:
                inset 0 10px 18px rgba(255, 255, 255, 0.35),
                0 16px 28px rgba(31, 41, 51, 0.18);
            transition: transform 140ms ease, box-shadow 140ms ease;
            animation: float-in 420ms ease both;
        }

        .circle:active,
        .circle.dragging {
            cursor: grabbing;
            transform: scale(1.06);
            box-shadow:
                inset 0 12px 18px rgba(255, 255, 255, 0.45),
                0 24px 34px rgba(31, 41, 51, 0.22);
        }

        .circle:nth-child(1) { background: linear-gradient(135deg, #ff8a5b, #ff5d73); }
        .circle:nth-child(2) { background: linear-gradient(135deg, #2ec4b6, #0ea5e9); }
        .circle:nth-child(3) { background: linear-gradient(135deg, #ffd166, #f59e0b); }
        .circle:nth-child(4) { background: linear-gradient(135deg, #8ecae6, #3a86ff); }
        .circle:nth-child(5) { background: linear-gradient(135deg, #b8f2e6, #57cc99); }

        @keyframes float-in {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 700px) {
            .panel {
                top: 0.75rem;
                left: 0.75rem;
                right: 0.75rem;
                max-width: none;
            }

            .circle {
                --size: 84px;
            }
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Deplace les cercles</h1>
        <p>Clique et glisse un cercle avec la souris. Les cercles restent dans la zone visible.</p>
    </div>

    <main class="playground" aria-label="Zone de jeu interactive">
        <button class="circle" style="left: 12%; top: 26%;" aria-label="Cercle 1"></button>
        <button class="circle" style="left: 63%; top: 22%;" aria-label="Cercle 2"></button>
        <button class="circle" style="left: 31%; top: 66%;" aria-label="Cercle 3"></button>
        <button class="circle" style="left: 76%; top: 58%;" aria-label="Cercle 4"></button>
        <button class="circle" style="left: 50%; top: 42%;" aria-label="Cercle 5"></button>
    </main>

    <script>
        const playground = document.querySelector('.playground');
        const circles = [...document.querySelectorAll('.circle')];
        let activeCircle = null;
        let offsetX = 0;
        let offsetY = 0;

        const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

        function moveCircle(event) {
            if (!activeCircle) {
                return;
            }

            const area = playground.getBoundingClientRect();
            const size = activeCircle.offsetWidth;
            const nextLeft = clamp(event.clientX - area.left - offsetX, 0, area.width - size);
            const nextTop = clamp(event.clientY - area.top - offsetY, 0, area.height - size);

            activeCircle.style.left = nextLeft + 'px';
            activeCircle.style.top = nextTop + 'px';
        }

        function stopDrag() {
            if (!activeCircle) {
                return;
            }

            activeCircle.classList.remove('dragging');
            playground.classList.remove('dragging');
            activeCircle.releasePointerCapture?.(activeCircle.pointerIdValue);
            activeCircle = null;
        }

        circles.forEach((circle) => {
            circle.addEventListener('pointerdown', (event) => {
                activeCircle = circle;
                const bounds = circle.getBoundingClientRect();
                offsetX = event.clientX - bounds.left;
                offsetY = event.clientY - bounds.top;
                circle.pointerIdValue = event.pointerId;
                circle.setPointerCapture(event.pointerId);
                circle.classList.add('dragging');
                playground.classList.add('dragging');
            });

            circle.addEventListener('pointermove', moveCircle);
            circle.addEventListener('pointerup', stopDrag);
            circle.addEventListener('pointercancel', stopDrag);
        });

        window.addEventListener('pointerup', stopDrag);
    </script>
</body>
</html>
